name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (package, no SDK deps) + pytest
        run: |
          python -m pip install --upgrade pip
          # Tests stub the `agents` SDK and department kits, so install without deps.
          pip install -e . --no-deps
          pip install pytest

      - name: Compile the engine (no SDK needed)
        run: |
          find agency_kit -name '*.py' -print0 | xargs -0 python -m py_compile
          find agency_cli  -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Tests (no network / no API key)
        run: python -m pytest tests/ -q
