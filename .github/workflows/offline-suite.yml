name: offline-suite

on:
  pull_request:
  push:
    branches: [main]   # PRs already run; unscoped push would double-run every PR branch

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false   # PR-controlled code must not inherit the repo token
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e . -e ./agencykit pytest
      - run: python -m pytest
